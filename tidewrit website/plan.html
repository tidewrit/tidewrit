<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Trip — TideWrit</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2E6BFF;--blue-d:#1E4FCC;--navy:#0F1B3D;--sky:#EAF0FF;--bg:#F6F8FC;
  --card:#fff;--ink:#141C2E;--muted:#5B6478;--faint:#8A93A6;--border:#E7ECF4;--green:#1DA362;--amber:#B7791F;--sand:#F4EFE7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 70px}
.ic{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
/* HERO */
.hero{position:relative;margin:0 -16px 0;min-height:300px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;border-radius:0 0 28px 28px}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.08);animation:kb 18s ease-out forwards}
@keyframes kb{to{transform:scale(1)}}
.hero .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,27,61,.12) 0%,rgba(15,27,61,.4) 50%,rgba(15,27,61,.92) 100%)}
.hero.noimg{background:linear-gradient(155deg,#2E6BFF,#0F1B3D)}
.hero .in{position:relative;padding:26px 22px 24px;color:#fff}
.hero .brand{font-weight:800;font-size:16px}.hero .brand span{color:#8FB0FF}
.topbrand{position:absolute;top:22px;left:22px;z-index:2;color:#fff;font-weight:800;font-size:16px}.topbrand span{color:#8FB0FF}
.hero .eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#B9CBF0;margin-bottom:12px}
.hero .eyebrow svg{width:12px;height:12px;stroke:#8FB0FF}
.hero h1{font-family:'Fraunces',serif;font-weight:600;font-size:33px;line-height:1.08;letter-spacing:-.01em;text-shadow:0 2px 24px rgba(10,18,41,.4)}
.hero .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.hero .chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px}
.hero .chip svg{width:13px;height:13px;stroke:#fff}
/* COUNTDOWN + OVERVIEW */
.overview{margin-top:-30px;position:relative;z-index:3}
.countdown{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(15,27,61,.1);display:flex;align-items:center;gap:16px;margin-bottom:12px}
.cd-num{font-family:'Fraunces',serif;font-weight:700;font-size:38px;color:var(--blue);line-height:1;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:12px;color:var(--muted);font-weight:600}
.cd-lbl b{display:block;font-size:15px;color:var(--navy);font-weight:800}
.cd-badge{margin-left:auto;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:6px 12px;border-radius:99px}
.badge-planning{background:#FFF4E0;color:var(--amber)}.badge-booked{background:var(--sky);color:var(--blue)}
.badge-progress{background:#E7F7EE;color:var(--green)}.badge-completed{background:#EEF2F7;color:var(--muted)}
.ovstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.ovstat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.ovstat svg{width:17px;height:17px;stroke:var(--blue);margin-bottom:5px}
.ovstat .v{font-size:15px;font-weight:800;color:var(--navy)}
.ovstat .l{font-size:10px;color:var(--faint);font-weight:600;margin-top:1px}
.summary{background:linear-gradient(150deg,#F0F5FF,#EAF0FF);border:1px solid #D8E4FB;border-radius:16px;padding:15px 16px;display:flex;gap:11px}
.summary svg{width:18px;height:18px;stroke:var(--blue);flex-shrink:0;margin-top:1px}
.summary p{font-size:13.5px;line-height:1.6;color:var(--navy)}
.summary .lab{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:3px}
/* SECTION */
.sec{margin-top:30px}
.sec-h{display:flex;align-items:center;gap:10px;margin:0 4px 14px}
.sec-h .si{width:26px;height:26px;border-radius:8px;background:var(--sky);display:flex;align-items:center;justify-content:center}
.sec-h .si svg{width:15px;height:15px;stroke:var(--blue)}
.sec-h h2{font-size:16px;font-weight:800;letter-spacing:-.01em;color:var(--navy)}
.sec-h .rule{flex:1;height:1px;background:var(--border)}
/* DAY */
.day{margin-bottom:18px}
.day-head{display:flex;align-items:center;gap:10px;margin:0 4px 10px}
.day-num{font-family:'Fraunces',serif;font-weight:700;font-size:15px;color:#fff;background:var(--navy);width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-title{font-size:14.5px;font-weight:800;color:var(--navy)}
/* ACTIVITY CARD */
.item{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 2px rgba(15,27,61,.03)}
.item-photo{width:100%;height:180px;object-fit:cover;display:block;background:var(--sand)}
.item-body{padding:15px 16px}
.item-top{display:flex;gap:12px;align-items:flex-start}
.item-time{font-size:12px;font-weight:800;color:var(--blue);background:var(--sky);padding:5px 9px;border-radius:7px;white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0}
.item-title{font-size:16px;font-weight:800;color:var(--ink);line-height:1.3}
.item-desc{font-size:13.5px;color:var(--muted);line-height:1.6;margin-top:5px}
.item-facts{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.fact{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--navy);background:var(--bg);border:1px solid var(--border);padding:5px 10px;border-radius:8px}
.fact svg{width:12px;height:12px;stroke:var(--muted)}
.fact.book-included{background:#E7F7EE;border-color:#C6EED8;color:var(--green)}
.fact.book-booked{background:var(--sky);border-color:#D3E0FB;color:var(--blue)}
.fact.book-pay-there{background:#FFF4E0;border-color:#F3E2BC;color:var(--amber)}
.fact.book-optional{background:#EEF2F7;color:var(--muted)}
.item-tip{display:flex;gap:9px;background:linear-gradient(135deg,#FFF9ED,#FFF4E0);border:1px solid #F3E2BC;border-radius:11px;padding:11px 13px;margin-top:12px}
.item-tip svg{width:15px;height:15px;stroke:var(--amber);flex-shrink:0;margin-top:1px}
.item-tip .lab{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--amber);margin-bottom:2px}
.item-tip p{font-size:12.5px;line-height:1.55;color:#7A5A1E}
.item-map{display:block;margin-top:12px;border-radius:11px;overflow:hidden;border:1px solid var(--border);text-decoration:none}
.item-map img{width:100%;height:130px;object-fit:cover;display:block;background:linear-gradient(120deg,#E8EEF7,#DCE6F5)}
.item-dir{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:12px;border-radius:11px;text-decoration:none;transition:transform .12s,background .15s}
.item-dir:active{transform:scale(.97);background:#1a2b4d}
.item-dir svg{width:15px;height:15px;stroke:#fff}
/* INFO CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}
.card.accent{background:linear-gradient(150deg,#F0F5FF,#EAF0FF);border-color:#D8E4FB}
.brow{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;padding:7px 0;color:var(--muted)}
.brow b{color:var(--ink);font-weight:700}
.bbar{height:10px;background:#fff;border:1px solid var(--border);border-radius:99px;overflow:hidden;margin:10px 0 6px}
.bbar div{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-d));border-radius:99px;width:0;transition:width 1s cubic-bezier(.2,.7,.2,1)}
.blines{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.blines span{font-size:12px;font-weight:600;color:var(--navy);background:#fff;border:1px solid var(--border);padding:6px 11px;border-radius:99px}
.visa{font-size:14px;line-height:1.7;color:var(--ink)}
.pk{display:flex;gap:11px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.pk:last-child{border-bottom:none}
.pk .box{width:20px;height:20px;border-radius:6px;background:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pk .box svg{width:12px;height:12px;stroke:var(--blue);stroke-width:3}
/* FOOTER */
.foot{margin-top:34px;padding:24px 22px;background:var(--navy);border-radius:18px;text-align:center;color:#C9D8F5}
.foot .big{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:#fff;margin-bottom:6px}
.foot p{font-size:13px;line-height:1.6}
.foot a{color:#8FB0FF;font-weight:700;text-decoration:none}
.foot .fine{font-size:11px;color:#5B6890;margin-top:14px}
/* STATES */
.state{padding:90px 24px;text-align:center}
.state .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--sky);border-top-color:var(--blue);animation:sp 1s linear infinite;margin:0 auto 20px}
@keyframes sp{to{transform:rotate(360deg)}}
.state h1{font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:var(--navy);margin-bottom:8px}
.state p{font-size:14px;color:var(--muted);line-height:1.6;max-width:340px;margin:0 auto}
.state a{color:var(--blue);font-weight:700;text-decoration:none}
/* reveal animations */
.rv{opacity:0;transform:translateY(16px);animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes rise{to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.rv,.hero .bg{animation:none!important;opacity:1;transform:none}.bbar div{transition:none}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="state"><div class="spin"></div><h1>Opening your trip</h1><p>One moment while we bring everything together.</p></div>
</div>
<script>
const SB_URL='https://tvjmyclkhdcrppdgfnes.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2am15Y2xraGRjcnBwZGdmbmVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1Mjk2MTMsImV4cCI6MjEwMDEwNTYxM30.rXCXvIjLl-NprV6ZesDr34IispqiA8SVit-nP_NrP-Q';
const sb=window.supabase.createClient(SB_URL,SB_ANON);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
const fmtY=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):'';
const mapsUrl=loc=>`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(loc)}`;
const isCoord=loc=>/^-?\d+\.?\d*,\s*-?\d+\.?\d*$/.test((loc||'').trim());
const staticMap=loc=>{const m=/^\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*$/.exec(loc);
  if(m)return `https://staticmap.openstreetmap.de/staticmap.php?center=${m[1]},${m[2]}&zoom=15&size=600x260&markers=${m[1]},${m[2]},red-pushpin`;return null;};
const bookLabel={included:'Included',booked:'Booked',['pay-there']:'Pay on arrival',optional:'Optional'};

async function load(){
  const slug=new URLSearchParams(location.search).get('t');
  if(!slug) return state('This link looks incomplete','Please open the exact private link we sent you by email or WhatsApp.');
  try{
    const {data,error}=await sb.rpc('get_trip_by_slug',{p_slug:slug});
    if(error) throw error;
    const trip=data&&data[0];
    if(!trip) return state('We could not find this trip','Double-check your private link, or it may still be in the works. Email hello.tidewrite@gmail.com and we will sort it out.');
    render(trip);
  }catch(e){ state('We could not open your trip just now','Please try again in a moment. If it keeps happening, email hello.tidewrite@gmail.com.'); }
}
function state(t,b){document.getElementById('app').innerHTML=`<div class="state"><h1>${esc(t)}</h1><p>${b.replace('hello.tidewrite@gmail.com','<a href="mailto:hello.tidewrite@gmail.com">hello.tidewrite@gmail.com</a>')}</p></div>`;}

function render(t){
  const c=t.content||{}, days=c.days||[], budget=c.budget||{}, packing=c.packing||[], ov=c.overview||{};
  const pct=budget.total?Math.min(100,Math.round((budget.committed||0)/budget.total*100)):0;
  const nDays=days.length|| (t.start_date&&t.end_date?Math.round((new Date(t.end_date)-new Date(t.start_date))/864e5)+1:0);
  let secN=0, h='';
  const hasImg=!!t.cover_url;

  // HERO
  h+=`<div class="hero ${hasImg?'':'noimg'} rv">`;
  if(hasImg){h+=`<div class="bg" style="background-image:url('${esc(t.cover_url)}')"></div><div class="topbrand">Tide<span>Writ</span></div>`;}
  h+=`<div class="in">${hasImg?'':'<div class="brand">Tide<span>Writ</span></div>'}
    <div style="margin-top:${hasImg?'170px':'40px'}">
    <div class="eyebrow"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Private trip · crafted for you</div>
    <h1>${esc(t.title)}</h1>
    <div class="meta">
      ${t.destination?`<span class="chip"><svg class="ic" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(t.destination)}</span>`:''}
      ${t.start_date?`<span class="chip"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmt(t.start_date)} – ${fmtY(t.end_date)}</span>`:''}
      ${ov.tripType?`<span class="chip"><svg class="ic" viewBox="0 0 24 24"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 7.7l5.4-.8z"/></svg>${esc(ov.tripType)}</span>`:''}
    </div></div></div>`;

  // OVERVIEW: countdown + stats + summary
  h+=`<div class="overview rv" style="animation-delay:.05s">`;
  // countdown
  let cdHtml='';
  if(t.start_date){
    const today=new Date();today.setHours(0,0,0,0);
    const start=new Date(t.start_date+'T00:00:00');
    const dd=Math.round((start-today)/864e5);
    if(dd>0) cdHtml=`<div class="cd-num">${dd}</div><div class="cd-lbl">days until<br><b>you depart</b></div>`;
    else if(dd===0) cdHtml=`<div class="cd-num">Today</div><div class="cd-lbl"><b>Departure day!</b></div>`;
    else cdHtml=`<div class="cd-num" style="font-size:24px">On trip</div><div class="cd-lbl"><b>Enjoy every moment</b></div>`;
  } else cdHtml=`<div class="cd-num" style="font-size:22px">Ready</div><div class="cd-lbl"><b>Your plan is set</b></div>`;
  const st=(ov.status||'Planning').toLowerCase();
  const stClass=st.includes('progress')?'badge-progress':st.includes('book')?'badge-booked':st.includes('complet')?'badge-completed':'badge-planning';
  h+=`<div class="countdown">${cdHtml}<span class="cd-badge ${stClass}">${esc(ov.status||'Planning')}</span></div>`;
  // stats
  h+=`<div class="ovstats">
    <div class="ovstat"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><div class="v">${nDays||'—'}</div><div class="l">Days</div></div>
    <div class="ovstat"><svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg><div class="v">${ov.travelers||'—'}</div><div class="l">Travelers</div></div>
    <div class="ovstat"><svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><div class="v">${budget.total?'$'+(budget.total>=1000?(budget.total/1000).toFixed(1)+'k':budget.total):'—'}</div><div class="l">Budget</div></div>
    <div class="ovstat"><svg class="ic" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><div class="v">${esc(cap(t.tier||'—'))}</div><div class="l">Plan</div></div>
  </div>`;
  // summary
  if(ov.summary){
    h+=`<div class="summary"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><div><div class="lab">Your trip at a glance</div><p>${esc(ov.summary)}</p></div></div>`;
  }
  h+=`</div>`;

  // ITINERARY
  if(days.length){
    secN++;
    h+=`<div class="sec rv" style="animation-delay:.1s">${secHead(secN,'Your itinerary','<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>')}`;
    days.forEach((d,di)=>{
      h+=`<div class="day"><div class="day-head"><div class="day-num">${d.day||di+1}</div><div class="day-title">${esc(d.title||('Day '+(d.day||di+1)))}</div></div>`;
      (d.items||[]).forEach(it=>{
        const loc=it.location||'';
        const sm=loc&&isCoord(loc)?staticMap(loc):null;
        const facts=[];
        if(it.duration)facts.push(['<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',esc(it.duration),'']);
        if(it.hours)facts.push(['<circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 15 15"/>',esc(it.hours),'']);
        if(it.price)facts.push(['<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',esc(it.price),'']);
        if(it.booking)facts.push(['<path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/>',bookLabel[it.booking]||it.booking,'book-'+it.booking]);
        h+=`<div class="item">
          ${it.photo?`<img class="item-photo" src="${esc(it.photo)}" alt="" loading="lazy" onerror="this.remove()">`:''}
          <div class="item-body">
            <div class="item-top">
              ${it.time?`<span class="item-time">${esc(it.time)}</span>`:''}
              <div style="flex:1">
                <div class="item-title">${esc(it.title||'')}</div>
                ${it.desc?`<div class="item-desc">${esc(it.desc)}</div>`:''}
              </div>
            </div>
            ${facts.length?`<div class="item-facts">${facts.map(f=>`<span class="fact ${f[2]}"><svg class="ic" viewBox="0 0 24 24">${f[0]}</svg>${f[1]}</span>`).join('')}</div>`:''}
            ${it.tip?`<div class="item-tip"><svg class="ic" viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg><div><div class="lab">Insider tip</div><p>${esc(it.tip)}</p></div></div>`:''}
            ${sm?`<a class="item-map" href="${mapsUrl(loc)}" target="_blank" rel="noopener"><img src="${sm}" alt="Map" loading="lazy" onerror="this.parentElement.remove()"></a>`:''}
            ${loc?`<a class="item-dir" href="${mapsUrl(loc)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Get directions</a>`:''}
          </div></div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  // BUDGET
  if(budget.total){
    secN++;
    h+=`<div class="sec rv" style="animation-delay:.15s">${secHead(secN,'Budget','<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>')}
      <div class="card accent">
        <div class="brow"><span>Planned total</span><b>$${Number(budget.total).toLocaleString()}</b></div>
        <div class="brow"><span>Committed so far</span><b>$${Number(budget.committed||0).toLocaleString()}</b></div>
        <div class="bbar"><div data-w="${pct}"></div></div>
        <div style="font-size:12px;color:var(--muted)">${pct}% allocated</div>
        ${(budget.lines||[]).length?`<div class="blines">${budget.lines.map(l=>`<span>${esc(l.label)} · $${Number(l.amount).toLocaleString()}</span>`).join('')}</div>`:''}
      </div></div>`;
  }
  // VISA
  if(c.visa){secN++;h+=`<div class="sec rv" style="animation-delay:.2s">${secHead(secN,'Entry & visa','<path d="M4 4h16v16H4z"/><path d="M8 4v16M4 9h4M4 15h4"/>')}<div class="card"><div class="visa">${esc(c.visa)}</div></div></div>`;}
  // PACKING
  if(packing.length){secN++;h+=`<div class="sec rv" style="animation-delay:.25s">${secHead(secN,'Packing checklist','<path d="M20 7h-4V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2H4a1 1 0 0 0-1 1v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a1 1 0 0 0-1-1z"/><path d="M10 7V5h4v2"/>')}<div class="card">${packing.map(p=>`<div class="pk"><div class="box"><svg class="ic" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>${esc(p)}</div>`).join('')}</div></div>`;}

  h+=`<div class="foot rv" style="animation-delay:.3s"><div class="big">We're with you the whole way.</div><p>Any question, any time — reach your travel team at<br><a href="mailto:hello.tidewrite@gmail.com">hello.tidewrite@gmail.com</a></p><div class="fine">TideWrit · a service of Troven Enterprises SMC Ltd, Kampala</div></div>`;

  document.getElementById('app').innerHTML=h;
  document.title=`${t.title} — TideWrit`;
  // animate budget bar after paint
  requestAnimationFrame(()=>setTimeout(()=>{const b=document.querySelector('.bbar div[data-w]');if(b)b.style.width=b.dataset.w+'%';},350));
}
function secHead(n,title,svg){return `<div class="sec-h"><div class="si"><svg class="ic" viewBox="0 0 24 24">${svg}</svg></div><h2>${title}</h2><span class="rule"></span></div>`;}
load();
</script>
</body>
</html>
